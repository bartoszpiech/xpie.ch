<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  $if(description)$<meta name="description" content="$description$">$endif$
  <title>xpie.ch</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="menubar">
    <span class="menu-logo">&#9670;</span>
    <span class="menu-appname">xpie.ch</span>
    <a href="/about.html"      class="menu-item">about</a>
    <a href="/projects.html"   class="menu-item">projects</a>
    <a href="/resume.html"     class="menu-item">resume</a>
    <a href="/blog/index.html" class="menu-item">blog</a>
    <span class="menu-spacer"></span>
    <span class="menu-right">
      $if(total-kb)$&#9632;&thinsp;$total-kb$ &nbsp;&middot;&nbsp; $endif$$if(page-count)$$page-count$&thinsp;pages &nbsp;&middot;&nbsp; $endif$$if(post-count)$$post-count$&thinsp;posts &nbsp;&middot;&nbsp; $endif$
      <span class="battery">
        <span class="battery-bar"><span class="battery-fill"></span></span>
        <span class="battery-tip"></span>
      </span>
    </span>
  </header>

  <div class="desktop">
    <div class="desktop-icons">
      <a href="https://linkedin.com" class="icon" target="_blank" rel="noopener">
        <span class="icon-emoji">🗑️</span>
        <span class="icon-label">trash</span>
      </a>
      <a href="/about.html" class="icon">
        <span class="icon-emoji">📄</span>
        <span class="icon-label">about.txt</span>
      </a>
      <a href="/projects.html" class="icon">
        <span class="icon-emoji">📁</span>
        <span class="icon-label">projects</span>
      </a>
      <a href="/resume.html" class="icon">
        <span class="icon-emoji">📋</span>
        <span class="icon-label">resume.pdf</span>
      </a>
      <a href="/blog/index.html" class="icon">
        <span class="icon-emoji">📂</span>
        <span class="icon-label">blog</span>
      </a>
      <a href="/bajo.html" class="icon">
        <span class="icon-emoji">🤠</span>
        <span class="icon-label">bajo.bmp</span>
      </a>
      <a href="https://dtinth.github.io/comic-mono-font/" class="icon" target="_blank" rel="noopener">
        <span class="icon-emoji">📜</span>
        <span class="icon-label">comicmono.ttf</span>
      </a>
    </div>
  </div>
</body>
</html>
