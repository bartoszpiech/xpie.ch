name: build and deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # daily at 7am UTC (9am Warsaw)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.6.4/pandoc-3.6.4-1-amd64.deb
          sudo dpkg -i pandoc-3.6.4-1-amd64.deb

      - name: install minify
        run: |
          go install github.com/tdewolff/minify/v2/cmd/minify@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: install fonttools
        run: pip install fonttools brotli

      - name: ping server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          EXPIRY=$(ssh -i ~/.ssh/server_key -o StrictHostKeyChecking=no -p 11335 frog@frog02.mikr.us \
            "grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' /data_waznosci.txt")
          echo "SERVER_EXPIRY=$EXPIRY" >> $GITHUB_ENV
          rm ~/.ssh/server_key

      - name: build
        run: make SKIP_WEATHER=1 SERVER_EXPIRY=${{ env.SERVER_EXPIRY }} && make subset-font && make SERVER_EXPIRY=${{ env.SERVER_EXPIRY }}

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
